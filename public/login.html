<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mneme — Sign In</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-logo">
                <svg width="48" height="48" viewBox="0 0 28 28" fill="none">
                    <circle cx="14" cy="14" r="12" stroke="url(#login-grad)" stroke-width="1.5" fill="rgba(124,92,252,0.08)"/>
                    <path d="M10 14c0-2.2 1.8-4 4-4s4 1.8 4 4-1.8 4-4 4" stroke="url(#login-grad)" stroke-width="1.5" stroke-linecap="round"/>
                    <circle cx="14" cy="14" r="2" fill="#7c5cfc"/>
                    <defs>
                        <linearGradient id="login-grad" x1="0" y1="0" x2="28" y2="28">
                            <stop stop-color="#7c5cfc"/>
                            <stop offset="1" stop-color="#9d85fd"/>
                        </linearGradient>
                    </defs>
                </svg>
            </div>
            <h1 class="login-title">Welcome to <span class="brand-gradient">Mneme</span></h1>
            <p class="login-subtitle">Sign in to your AI operator</p>

            <div id="login-error" class="login-error hidden"></div>

            <form id="auth-form" class="login-form">
                <input type="email" id="auth-email" class="login-input" placeholder="Email" required autocomplete="email">
                <input type="password" id="auth-password" class="login-input" placeholder="Password" required autocomplete="current-password">
                <button type="submit" id="auth-submit" class="login-btn">
                    <span id="auth-btn-text">Sign In</span>
                </button>
            </form>

            <div class="login-divider">
                <span>or</span>
            </div>

            <button id="google-btn" class="google-btn">
                <svg width="18" height="18" viewBox="0 0 18 18">
                    <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 01-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
                    <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z" fill="#34A853"/>
                    <path d="M3.964 10.71A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 000 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
                    <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
                </svg>
                Sign in with Google
            </button>

            <p class="login-toggle">
                <span id="toggle-text">Don't have an account?</span>
                <button type="button" id="toggle-mode" class="login-link">Sign Up</button>
            </p>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script>
        firebase.initializeApp({
            apiKey: "AIzaSyB_8j22aPlBgIgbOA1uCcqW47t0us5AKNo",
            authDomain: "mneme-f0a0d.firebaseapp.com",
            projectId: "mneme-f0a0d",
            storageBucket: "mneme-f0a0d.firebasestorage.app",
            messagingSenderId: "9810458426",
            appId: "1:9810458426:web:a40d00b2ed64d0a3ba8203",
            measurementId: "G-NW17PTVK4V"
        });

        const auth = firebase.auth();
        let isSignUp = false;

        const form = document.getElementById("auth-form");
        const emailInput = document.getElementById("auth-email");
        const passwordInput = document.getElementById("auth-password");
        const submitBtn = document.getElementById("auth-submit");
        const btnText = document.getElementById("auth-btn-text");
        const errorEl = document.getElementById("login-error");
        const toggleBtn = document.getElementById("toggle-mode");
        const toggleText = document.getElementById("toggle-text");
        const googleBtn = document.getElementById("google-btn");

        // If already signed in, go to chat
        auth.onAuthStateChanged(user => {
            if (user) window.location.href = "/";
        });

        // Toggle sign-in / sign-up mode
        toggleBtn.addEventListener("click", () => {
            isSignUp = !isSignUp;
            btnText.textContent = isSignUp ? "Sign Up" : "Sign In";
            toggleText.textContent = isSignUp ? "Already have an account?" : "Don't have an account?";
            toggleBtn.textContent = isSignUp ? "Sign In" : "Sign Up";
            passwordInput.autocomplete = isSignUp ? "new-password" : "current-password";
            hideError();
        });

        // Email/password auth
        form.addEventListener("submit", async (e) => {
            e.preventDefault();
            hideError();
            submitBtn.disabled = true;
            btnText.textContent = isSignUp ? "Creating account..." : "Signing in...";

            try {
                if (isSignUp) {
                    await auth.createUserWithEmailAndPassword(emailInput.value, passwordInput.value);
                } else {
                    await auth.signInWithEmailAndPassword(emailInput.value, passwordInput.value);
                }
                // onAuthStateChanged will redirect
            } catch (err) {
                showError(friendlyError(err.code));
                submitBtn.disabled = false;
                btnText.textContent = isSignUp ? "Sign Up" : "Sign In";
            }
        });

        // Google sign-in
        googleBtn.addEventListener("click", async () => {
            hideError();
            const provider = new firebase.auth.GoogleAuthProvider();
            try {
                await auth.signInWithPopup(provider);
            } catch (err) {
                if (err.code !== "auth/popup-closed-by-user") {
                    showError(friendlyError(err.code));
                }
            }
        });

        function showError(msg) {
            errorEl.textContent = msg;
            errorEl.classList.remove("hidden");
        }

        function hideError() {
            errorEl.classList.add("hidden");
        }

        function friendlyError(code) {
            switch (code) {
                case "auth/email-already-in-use": return "An account with this email already exists.";
                case "auth/invalid-email": return "Please enter a valid email address.";
                case "auth/weak-password": return "Password must be at least 6 characters.";
                case "auth/user-not-found":
                case "auth/wrong-password":
                case "auth/invalid-credential": return "Invalid email or password.";
                case "auth/too-many-requests": return "Too many attempts. Please try again later.";
                default: return "Something went wrong. Please try again.";
            }
        }
    </script>
</body>
</html>
