<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mneme — Your AI Operator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <header>
            <div class="header-top">
                <div class="logo">
                    <div class="logo-icon">
                        <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
                            <circle cx="14" cy="14" r="12" stroke="url(#logo-grad)" stroke-width="1.5" fill="rgba(124,92,252,0.08)"/>
                            <path d="M10 14c0-2.2 1.8-4 4-4s4 1.8 4 4-1.8 4-4 4" stroke="url(#logo-grad)" stroke-width="1.5" stroke-linecap="round"/>
                            <circle cx="14" cy="14" r="2" fill="#7c5cfc"/>
                            <defs>
                                <linearGradient id="logo-grad" x1="0" y1="0" x2="28" y2="28">
                                    <stop stop-color="#7c5cfc"/>
                                    <stop offset="1" stop-color="#9d85fd"/>
                                </linearGradient>
                            </defs>
                        </svg>
                    </div>
                    <h1>Mneme</h1>
                    <span class="status-dot"></span>
                </div>
                <div class="header-actions">
                    <span id="user-email" class="user-email"></span>
                    <button id="logout-btn" class="logout-btn" title="Sign out">Sign out</button>
                    <button id="integrations-toggle" class="integrations-toggle-btn" title="Manage integrations">
                        <span class="toggle-icon">&#x1F517;</span>
                        <span class="toggle-label">Integrations</span>
                        <span id="connected-count" class="connected-badge">0</span>
                    </button>
                </div>
            </div>
            <div id="integrations-panel" class="integrations-panel">
                <div class="integrations-header">
                    <span class="integrations-title">Connect your apps via One</span>
                    <a href="https://www.withone.ai" target="_blank" class="one-badge">powered by One</a>
                </div>
                <div id="integrations-list" class="integrations-list">
                    <!-- Populated by JS -->
                </div>
            </div>
        </header>

        <!-- Model Selector -->
        <div class="model-bar">
            <div class="model-chips">
                <button class="model-chip active" data-model="moonshotai/Kimi-K2.5" data-type="text">
                    <span class="chip-dot text"></span>
                    Kimi K2.5
                </button>
                <button class="model-chip" data-model="gpt-4o-realtime-preview-2025-06-03" data-type="voice">
                    <span class="chip-dot voice"></span>
                    GPT-4o Realtime
                    <span class="chip-badge">Voice</span>
                </button>
            </div>
        </div>

        <!-- Hidden audio element for voice playback -->
        <audio id="voice-audio" autoplay style="display:none;"></audio>

        <div id="chat-area">
            <div id="messages">
                <!-- Welcome state (removed on first message) -->
                <div id="welcome-state" class="welcome-card">
                    <div class="welcome-icon">
                        <svg width="48" height="48" viewBox="0 0 28 28" fill="none">
                            <circle cx="14" cy="14" r="12" stroke="url(#welcome-grad)" stroke-width="1.5" fill="rgba(124,92,252,0.08)"/>
                            <path d="M10 14c0-2.2 1.8-4 4-4s4 1.8 4 4-1.8 4-4 4" stroke="url(#welcome-grad)" stroke-width="1.5" stroke-linecap="round"/>
                            <circle cx="14" cy="14" r="2" fill="#7c5cfc"/>
                            <defs>
                                <linearGradient id="welcome-grad" x1="0" y1="0" x2="28" y2="28">
                                    <stop stop-color="#7c5cfc"/>
                                    <stop offset="1" stop-color="#9d85fd"/>
                                </linearGradient>
                            </defs>
                        </svg>
                    </div>
                    <h2 class="welcome-title">Welcome to <span class="brand-gradient">Mneme</span></h2>
                    <p class="welcome-subtitle">Your AI operator with persistent memory, app integrations, and full transparency.</p>
                    <div class="welcome-features">
                        <div class="welcome-feature">
                            <div class="feature-icon">
                                <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
                                    <circle cx="8" cy="8" r="3"/>
                                    <path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.05 3.05l1.41 1.41M11.54 11.54l1.41 1.41M3.05 12.95l1.41-1.41M11.54 4.46l1.41-1.41"/>
                                </svg>
                            </div>
                            <span>Persistent memory across sessions</span>
                        </div>
                        <div class="welcome-feature">
                            <div class="feature-icon">
                                <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M6 3h8M6 8h8M6 13h8M2 3h0M2 8h0M2 13h0"/>
                                </svg>
                            </div>
                            <span>Gmail, Calendar, GitHub, Slack via One</span>
                        </div>
                        <div class="welcome-feature">
                            <div class="feature-icon">
                                <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                    <rect x="2" y="4" width="12" height="9" rx="1.5"/>
                                    <path d="M5 4V2.5A1.5 1.5 0 0 1 6.5 1h3A1.5 1.5 0 0 1 11 2.5V4"/>
                                    <path d="M8 8v2"/>
                                </svg>
                            </div>
                            <span>Trust receipts on every response</span>
                        </div>
                    </div>
                    <div class="welcome-prompts">
                        <button class="prompt-chip" data-prompt="Remind me to review the PR tomorrow at 9am">Remind me to review the PR</button>
                        <button class="prompt-chip" data-prompt="Draft an email to the team about the launch">Draft a launch email</button>
                        <button class="prompt-chip" data-prompt="What do you remember about me?">What do you remember?</button>
                    </div>
                </div>
            </div>

            <div id="loading" class="hidden">
                <div class="typing-indicator">
                    <span class="typing-dot"></span>
                    <span class="typing-dot"></span>
                    <span class="typing-dot"></span>
                </div>
                <span class="typing-text">Mneme is thinking</span>
            </div>
        </div>

        <form id="input-form">
            <span id="voice-status" class="voice-status hidden"></span>
            <div class="input-wrapper">
                <input type="text" id="user-input" placeholder="Ask Mneme anything..." autocomplete="off" autofocus>
                <span class="input-hint">Press Enter</span>
                <button type="button" id="voice-btn" class="voice-btn hidden" aria-label="Start voice" title="Start voice session">
                    <svg width="18" height="18" viewBox="0 0 16 16" fill="none">
                        <path d="M8 1a2.5 2.5 0 0 0-2.5 2.5v4a2.5 2.5 0 0 0 5 0v-4A2.5 2.5 0 0 0 8 1z" stroke="currentColor" stroke-width="1.5"/>
                        <path d="M3.5 7a4.5 4.5 0 0 0 9 0" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                        <path d="M8 13v2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                    </svg>
                </button>
                <button type="submit" id="send-btn" aria-label="Send message">
                    <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                        <path d="M3.75 9h10.5M9.75 4.5L14.25 9l-4.5 4.5" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
            </div>
        </form>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script>
        firebase.initializeApp({
            apiKey: "AIzaSyB_8j22aPlBgIgbOA1uCcqW47t0us5AKNo",
            authDomain: "mneme-f0a0d.firebaseapp.com",
            projectId: "mneme-f0a0d",
            storageBucket: "mneme-f0a0d.firebasestorage.app",
            messagingSenderId: "9810458426",
            appId: "1:9810458426:web:a40d00b2ed64d0a3ba8203",
            measurementId: "G-NW17PTVK4V"
        });
    </script>
    <script src="app.js"></script>
    <script src="voice.js"></script>
</body>
</html>
